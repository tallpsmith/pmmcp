volumes:
  pmmcp-archives:

services:
  pmlogsynth-generator:
    build: ./generator
    volumes:
      - ${PROFILES_DIR:-./profiles/scenarios}:/profiles:ro
      - pmmcp-archives:/archives

  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  pmlogsynth-seeder:
    image: quay.io/performancecopilot/pcp:latest
    volumes:
      - pmmcp-archives:/archives:ro
    environment:
      KEY_SERVERS: redis-stack:6379
    command:
      - bash
      - -c
      - |
        set -euo pipefail;
        for archive_dir in /archives/*/; do
            stem=$$(basename "$$archive_dir");
            archive_path="/archives/$${stem}/$${stem}";

            echo "INFO: --- $${stem} ---";
            echo "INFO: archive contents:";
            ls -lh "/archives/$${stem}/";

            echo "INFO: archive bounds:";
            pmdumplog -l "$${archive_path}" 2>&1;

            echo "INFO: loading $${stem} into pmseries";
            if ! pmseries --load "$${archive_path}"; then
                echo "ERROR: pmseries --load failed for $${stem}";
                exit 1;
            fi;

            echo "INFO: $${stem} loaded — verifying index:";
            series_count=$$(pmseries 'kernel.all.cpu.user' 2>/dev/null | wc -l || echo 0);
            echo "INFO: $${stem} — $${series_count} kernel.all.cpu.user series now in index";
        done;
        echo "INFO: all archives seeded";
    depends_on:
      pmlogsynth-generator:
        condition: service_completed_successfully
      redis-stack:
        condition: service_healthy

  pcp:
    image: quay.io/performancecopilot/pcp:latest
    privileged: true
    ports:
      - "44322:44322"
    environment:
      KEY_SERVERS: redis-stack:6379
    depends_on:
      pmlogsynth-seeder:
        condition: service_completed_successfully

  pmmcp:
    build: .
    ports:
      - "8080:8080"
    environment:
      PMPROXY_URL: http://pcp:44322
    depends_on:
      pcp:
        condition: service_started
    healthcheck:
      # Liveness only — confirms HTTP server accepts connections (ignores pmproxy status)
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\",8080),2).close()'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # Grafana with PCP plugin — browse http://localhost:3000 (anonymous admin, no login)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      # PCP plugin is unsigned — install from GitHub release ZIP and allow all its sub-plugins
      GF_INSTALL_PLUGINS: "https://github.com/performancecopilot/grafana-pcp/releases/download/v5.3.0/performancecopilot-pcp-app-5.3.0.zip;performancecopilot-pcp-app"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "performancecopilot-pcp-app,performancecopilot-valkey-datasource,performancecopilot-vector-datasource,performancecopilot-bpftrace-datasource,performancecopilot-flamegraph-panel,performancecopilot-breadcrumbs-panel,performancecopilot-troubleshooting-panel"
      # Anonymous admin for browser access; basic auth creds for mcp-grafana API access
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      pcp:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  # mcp-grafana — MCP server for Grafana, SSE transport on http://localhost:8000/sse
  mcp-grafana:
    image: mcp/grafana
    ports:
      - "8000:8000"
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USERNAME: admin
      GRAFANA_PASSWORD: admin
    depends_on:
      grafana:
        condition: service_healthy
