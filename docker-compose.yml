volumes:
  pmmcp-archives:

services:
  pmlogsynth-generator:
    build: ./generator
    volumes:
      - ${PROFILES_DIR:-./profiles/scenarios}:/profiles:ro
      - pmmcp-archives:/archives

  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  pmlogsynth-seeder:
    image: quay.io/performancecopilot/pcp:latest
    volumes:
      - pmmcp-archives:/archives:ro
    environment:
      KEY_SERVERS: redis-stack:6379
    command:
      - bash
      - -c
      - |
        set -euo pipefail;
        for archive_dir in /archives/*/; do
            stem=$$(basename "$$archive_dir");
            archive_path="/archives/$${stem}/$${stem}";

            echo "INFO: --- $${stem} ---";
            echo "INFO: archive contents:";
            ls -lh "/archives/$${stem}/";

            echo "INFO: archive bounds:";
            pmdumplog -l "$${archive_path}" 2>&1;

            echo "INFO: loading $${stem} into pmseries";
            if ! pmseries --load "$${archive_path}"; then
                echo "ERROR: pmseries --load failed for $${stem}";
                exit 1;
            fi;

            echo "INFO: $${stem} loaded — verifying index:";
            series_count=$$(pmseries 'kernel.all.cpu.user' 2>/dev/null | wc -l || echo 0);
            echo "INFO: $${stem} — $${series_count} kernel.all.cpu.user series now in index";
        done;
        echo "INFO: all archives seeded";
    depends_on:
      pmlogsynth-generator:
        condition: service_completed_successfully
      redis-stack:
        condition: service_healthy

  pcp:
    image: quay.io/performancecopilot/pcp:latest
    privileged: true
    ports:
      - "44322:44322"
    environment:
      KEY_SERVERS: redis-stack:6379
    depends_on:
      pmlogsynth-seeder:
        condition: service_completed_successfully
